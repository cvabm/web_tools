    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 48px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 56px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #6b7280;
            text-transform: uppercase;
        }

        header h1 span {
            color: #6366f1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .group {
            margin-bottom: 40px;
        }

        .group-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        a.btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 400;
            text-decoration: none;
            border: 1px solid #e0e0d8;
            background: #ffffff;
            color: #1a1a1a;
            transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
        }

        a.btn:hover {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
            transform: translateY(-1px);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        a.list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #e0e0d8;
            background: #ffffff;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        a.list-item:hover {
            background: #eef2ff;
            border-color: #6366f1;
            transform: translateX(3px);
        }

        a.list-item::before {
            content: '↗';
            font-size: 0.75rem;
            color: #6366f1;
            opacity: 0.8;
        }

        hr {
            border: none;
            border-top: 1px solid #e0e0d8;
            margin: 40px 0;
        }
    </style>
</head>
