<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #e0e0d8;
    --accent: #6366f1;
    --accent2: #ec4899;
    --text: #1a1a1a;
    --muted: #9ca3af;
    --card-hover: #f0f0ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(245,245,240,.9);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    font-size: 1.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: .04em;
  }

  .search-wrap {
    position: relative;
    flex: 1; max-width: 480px; margin: 0 40px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 42px;
    color: var(--text);
    font-size: .9rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  }

  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    opacity: .35; pointer-events: none;
    color: var(--text);
  }

  .tag-filter {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .tag-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    color: var(--muted);
    font-size: .78rem;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .tag-btn:hover, .tag-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  main { padding: 40px 40px 0; max-width: 1300px; margin: 0 auto; }

  .section-title {
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-left: 2px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  .section + .section { margin-top: 40px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: flex-start; gap: 14px;
    text-decoration: none;
    color: inherit;
    transition: background .18s, border-color .18s, transform .18s, box-shadow .18s;
    animation: fadeUp .4s both;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: rgba(99,102,241,.4);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(99,102,241,.08);
  }

  .icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .card-body { min-width: 0; }
  .card-name {
    font-size: .9rem; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
    color: var(--text);
  }
  .card-desc {
    font-size: .75rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
  }

  .hero {
    text-align: center;
    padding: 50px 20px 30px;
  }
  .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .hero span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p { color: var(--muted); font-size: .9rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    .search-wrap { margin: 0; order: 3; max-width: 100%; flex: 0 0 100%; }
    .tag-filter { display: none; }
    main { padding: 20px 16px 0; }
    .hero h1 { font-size: 1.5rem; }
  }

  .card.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">✦ 导航</div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="搜索网站…" autocomplete="off">
  </div>
  <div class="tag-filter">
    <button class="tag-btn active" data-tag="all">全部</button>
    <button class="tag-btn" data-tag="search">搜索</button>
    <button class="tag-btn" data-tag="social">社交</button>
    <button class="tag-btn" data-tag="ai">AI</button>
    <button class="tag-btn" data-tag="dev">开发</button>
    <button class="tag-btn" data-tag="design">设计</button>
  </div>
</header>

<div class="hero">
  <h1>你的<span>网址导航</span></h1>
  <p>收藏常用网站，快速直达</p>
</div>

<main id="main"></main>

<script>
const data = [
  {
    section: "🔍 搜索引擎",
    tag: "search",
    sites: [
      { name: "Google", desc: "全球最大搜索引擎", url: "https://google.com", icon: "🌐" },
      { name: "百度", desc: "中文搜索首选", url: "https://baidu.com", icon: "🅱" },
      { name: "必应 Bing", desc: "微软出品，AI加持", url: "https://bing.com", icon: "🔷" },
      { name: "DuckDuckGo", desc: "隐私优先搜索", url: "https://duckduckgo.com", icon: "🦆" },
    ]
  },
  {
    section: "💬 社交媒体",
    tag: "social",
    sites: [
      { name: "微博", desc: "中文社交媒体平台", url: "https://weibo.com", icon: "🌸" },
      { name: "Twitter / X", desc: "全球实时资讯", url: "https://x.com", icon: "✕" },
      { name: "Reddit", desc: "万能讨论社区", url: "https://reddit.com", icon: "🤖" },
      { name: "YouTube", desc: "全球最大视频平台", url: "https://youtube.com", icon: "▶" },
      { name: "哔哩哔哩", desc: "年轻人的视频社区", url: "https://bilibili.com", icon: "📺" },
    ]
  },
  {
    section: "🤖 AI 工具",
    tag: "ai",
    sites: [
      { name: "Claude", desc: "Anthropic 出品 AI", url: "https://claude.ai", icon: "✦" },
      { name: "ChatGPT", desc: "OpenAI 对话 AI", url: "https://chatgpt.com", icon: "💬" },
      { name: "Gemini", desc: "Google AI 助手", url: "https://gemini.google.com", icon: "♊" },
      { name: "Perplexity", desc: "AI 搜索引擎", url: "https://perplexity.ai", icon: "🔮" },
      { name: "Midjourney", desc: "AI 图像生成", url: "https://midjourney.com", icon: "🎨" },
    ]
  },
  {
    section: "💻 开发工具",
    tag: "dev",
    sites: [
      { name: "GitHub", desc: "代码托管与协作", url: "https://github.com", icon: "🐙" },
      { name: "Stack Overflow", desc: "开发者问答社区", url: "https://stackoverflow.com", icon: "📚" },
      { name: "MDN Web Docs", desc: "Web 开发文档", url: "https://developer.mozilla.org", icon: "🦊" },
      { name: "CodePen", desc: "前端在线编辑器", url: "https://codepen.io", icon: "🖊" },
      { name: "npm", desc: "JS 包管理仓库", url: "https://npmjs.com", icon: "📦" },
      { name: "Can I Use", desc: "浏览器兼容查询", url: "https://caniuse.com", icon: "✅" },
    ]
  },
  {
    section: "🎨 设计资源",
    tag: "design",
    sites: [
      { name: "Figma", desc: "协作设计工具", url: "https://figma.com", icon: "🎯" },
      { name: "Dribbble", desc: "设计师作品展示", url: "https://dribbble.com", icon: "🏀" },
      { name: "Unsplash", desc: "免费高质量图片", url: "https://unsplash.com", icon: "📷" },
      { name: "Coolors", desc: "配色方案生成", url: "https://coolors.co", icon: "🎨" },
      { name: "Google Fonts", desc: "免费网页字体库", url: "https://fonts.google.com", icon: "Aa" },
    ]
  },
];

const main = document.getElementById('main');
const searchInput = document.getElementById('searchInput');
const tagBtns = document.querySelectorAll('.tag-btn');
let activeTag = 'all';

function render() {
  main.innerHTML = '';
  data.forEach((group, gi) => {
    if (activeTag !== 'all' && group.tag !== activeTag) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${group.section}</div><div class="grid"></div>`;
    const grid = sec.querySelector('.grid');
    const q = searchInput.value.trim().toLowerCase();
    let shown = 0;
    group.sites.forEach((site, si) => {
      if (q && !site.name.toLowerCase().includes(q) && !site.desc.toLowerCase().includes(q)) return;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = site.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = (gi * 80 + si * 40) + 'ms';
      a.innerHTML = `
        <div class="icon">${site.icon}</div>
        <div class="card-body">
          <div class="card-name">${site.name}</div>
          <div class="card-desc">${site.desc}</div>
        </div>`;
      grid.appendChild(a);
      shown++;
    });
    if (shown > 0) main.appendChild(sec);
  });
}

searchInput.addEventListener('input', render);

tagBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tagBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    render();
  });
});

render();
</script>
</body>
</html>
