<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片换色</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: monospace;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; margin-bottom: 30px; color: #222; }

  .upload-area {
    width: 500px;
    min-height: 200px;
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    margin-bottom: 12px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
  }
  .upload-area:hover { border-color: #888; }
  .upload-area.has-image { cursor: crosshair; border-style: solid; border-color: #ccc; }

  #canvas { max-width: 500px; display: none; }
  #canvas.show { display: block; }

  .tip {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
    height: 16px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .color-pair {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1px solid #ddd;
    padding: 8px 12px;
    border-radius: 4px;
  }

  .swatch {
    width: 28px; height: 28px;
    border-radius: 3px;
    border: 1px solid #ccc;
    flex-shrink: 0;
  }

  input[type="text"] {
    width: 88px;
    padding: 6px 8px;
    border: 1px solid #ddd;
    border-radius: 3px;
    font-family: monospace;
    font-size: 13px;
  }

  .arrow { color: #aaa; font-size: 18px; }

  label.tolerance-label { font-size: 12px; color: #666; }
  input[type="range"] { width: 100px; }

  .btn {
    padding: 9px 22px;
    font-family: monospace;
    font-size: 13px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: #222;
    color: #fff;
  }
  .btn:hover { background: #444; }
  .btn.secondary { background: #fff; color: #444; border: 1px solid #ccc; }
  .btn.secondary:hover { background: #f0f0f0; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #fileInput { display: none; }
</style>
</head>
<body>

<h1>图片换色</h1>

<div class="upload-area" id="uploadArea">
  <span id="uploadHint">点击或拖拽上传图片</span>
  <canvas id="canvas"></canvas>
</div>

<div class="tip" id="tip">上传图片后点击图片拾取原色</div>

<div class="controls">
  <div class="color-pair">
    <div class="swatch" id="fromSwatch" style="background:#ff0000"></div>
    <input type="text" id="fromColor" value="#ff0000" placeholder="原色" maxlength="7">
    <span class="arrow">→</span>
    <div class="swatch" id="toSwatch" style="background:#0000ff"></div>
    <input type="text" id="toColor" value="#0000ff" placeholder="目标色" maxlength="7">
  </div>

  <label class="tolerance-label">容差 <span id="tolVal">30</span></label>
  <input type="range" id="tolerance" min="0" max="100" value="30">

  <button class="btn" id="applyBtn" disabled onclick="applyReplace()">替换颜色</button>
  <button class="btn secondary" id="saveBtn" disabled onclick="saveImage()">保存图片</button>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
  let originalData = null;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const area = document.getElementById('uploadArea');

  // Upload
  area.onclick = () => { if (!originalData) document.getElementById('fileInput').click(); };
  area.ondragover = e => { e.preventDefault(); area.style.borderColor = '#555'; };
  area.ondragleave = () => area.style.borderColor = '#ccc';
  area.ondrop = e => { e.preventDefault(); area.style.borderColor = '#ccc'; load(e.dataTransfer.files[0]); };
  document.getElementById('fileInput').onchange = e => load(e.target.files[0]);

  function load(file) {
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      const MAX = 600;
      let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      if (h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.classList.add('show');
      area.classList.add('has-image');
      document.getElementById('uploadHint').style.display = 'none';
      document.getElementById('applyBtn').disabled = false;
      document.getElementById('tip').textContent = '点击图片任意位置拾取原色';
    };
    img.src = URL.createObjectURL(file);
  }

  // Click canvas → pick color into fromColor
  canvas.addEventListener('click', e => {
    if (!originalData) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const y = Math.floor((e.clientY - rect.top)  * (canvas.height / rect.height));
    const p = ctx.getImageData(x, y, 1, 1).data;
    const hex = '#' + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');
    document.getElementById('fromColor').value = hex;
    document.getElementById('fromSwatch').style.background = hex;
    document.getElementById('tip').textContent = '已拾取：' + hex;
  });

  // Sync swatches
  document.getElementById('fromColor').oninput = () => {
    const v = document.getElementById('fromColor').value;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('fromSwatch').style.background = v;
  };
  document.getElementById('toColor').oninput = () => {
    const v = document.getElementById('toColor').value;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('toSwatch').style.background = v;
  };
  document.getElementById('tolerance').oninput = function() {
    document.getElementById('tolVal').textContent = this.value;
  };

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function applyReplace() {
    if (!originalData) return;
    const fromHex = document.getElementById('fromColor').value;
    const toHex   = document.getElementById('toColor').value;
    if (!/^#[0-9a-fA-F]{6}$/.test(fromHex) || !/^#[0-9a-fA-F]{6}$/.test(toHex)) {
      alert('请输入正确的颜色格式，如 #ff0000'); return;
    }
    const [fr,fg,fb] = hexToRgb(fromHex);
    const [tr,tg,tb] = hexToRgb(toHex);
    const tol = +document.getElementById('tolerance').value / 100 * 441;
    const copy = new ImageData(new Uint8ClampedArray(originalData.data), originalData.width, originalData.height);
    const d = copy.data;
    for (let i = 0; i < d.length; i += 4) {
      const dist = Math.sqrt((d[i]-fr)**2 + (d[i+1]-fg)**2 + (d[i+2]-fb)**2);
      if (dist <= tol) {
        const blend = 1 - dist / (tol + 0.001);
        d[i]   = Math.round(d[i]   + (tr-fr) * blend);
        d[i+1] = Math.round(d[i+1] + (tg-fg) * blend);
        d[i+2] = Math.round(d[i+2] + (tb-fb) * blend);
      }
    }
    ctx.putImageData(copy, 0, 0);
    originalData = copy;
    document.getElementById('saveBtn').disabled = false;
  }

  function saveImage() {
    const a = document.createElement('a');
    a.download = 'replaced.png';
    a.href = canvas.toDataURL();
    a.click();
  }
</script>
</body>
</html>
